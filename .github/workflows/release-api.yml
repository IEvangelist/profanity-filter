name: Release API container

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'The manual version to release'
        required: true

env:
  IMAGE_NAME: ievangelist/profanity-filter-api
  MSBUILDDEBUGENGINE: 1 # Enable MSBuild binary logging

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Check out the repo
        uses: actions/checkout@main

      - name: 🏷️ Get the version
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: echo "RELEASE_VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: 🏷️ Get the version
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: 💜 Setup .NET
        uses: actions/setup-dotnet@main

      - name: ✨ Install Aspire CLI
        run: curl -sSL https://aspire.dev/install.sh | bash

      - name: 📋 Output Aspire CLI version
        run: aspire --version

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 💾 Cache Aspire deployment state
        uses: actions/cache@v5
        with:
          path: ~/.aspire/deployments
          key: aspire-deploy-${{ hashFiles('**/apphost.cs') }}-${{ github.ref }}
          restore-keys: |
            aspire-deploy-${{ hashFiles('**/apphost.cs') }}-
            aspire-deploy-

      - name: 🚀 Deploy with Aspire
        working-directory: ./playground
        run: aspire deploy --environment production

      - name: 📦 Upload build log
        uses: actions/upload-artifact@main
        if: always()
        with:
          name: msbuild.binlog
          path: src/ProfanityFilter.WebApi/msbuild.binlog